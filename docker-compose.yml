name: quantedge-ai

# Production commands must pass --env-file .env.production or equivalent shell env
# for ${...} interpolation; service env_file only applies inside containers.
services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-quant_research}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-quant_research}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: &json-logs
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *json-logs

  migrate:
    build:
      context: .
      dockerfile: Dockerfile.api
      target: migrate
    restart: "no"
    env_file:
      - .env.production
    environment:
      SERVICE_NAME: quantedge-migrate
    depends_on:
      postgres:
        condition: service_healthy
    logging: *json-logs

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      SERVICE_NAME: quantedge-api
      PORT: 8080
      REDIS_URL: redis://redis:6379
      RUN_BACKGROUND_SERVICES: "true"
      SCHEDULER_IN_API_PROCESS: "false"
      TRUST_PROXY: "true"
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8080/api/readyz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
    logging: *json-logs

  worker:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    command:
      ["node", "--enable-source-maps", "artifacts/api-server/dist/worker.mjs"]
    env_file:
      - .env.production
    environment:
      SERVICE_NAME: quantedge-worker
      REDIS_URL: redis://redis:6379
      WORKER_QUEUES: reports,maintenance,scanner
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      disable: true
    logging: *json-logs

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    command:
      [
        "node",
        "--enable-source-maps",
        "artifacts/api-server/dist/scheduler.mjs",
      ]
    env_file:
      - .env.production
    environment:
      SERVICE_NAME: quantedge-scheduler
      REDIS_URL: redis://redis:6379
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      disable: true
    logging: *json-logs

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        BASE_PATH: /
        API_PROXY_TARGET: http://api:8080
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "21210:80"
    logging: *json-logs

  prometheus:
    image: prom/prometheus:v3.0.1
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      api:
        condition: service_healthy
    logging: *json-logs

  grafana:
    image: grafana/grafana:11.4.0
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD is required}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    logging: *json-logs

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
